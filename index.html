<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFC おみくじ</title>
  <!-- 和風フォント（明朝体）の読み込み -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0;
      padding: 20px 0; /* 上下の余白 */
      font-family: 'Noto Serif JP', serif;
      background-color: #2c3e50; /* 背景の落ち着いた紺色 */
      display: flex;
      justify-content: center;
      align-items: flex-start; /* 縦スクロールできるように上揃え */
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* おみくじの紙 */
    .omikuji-paper {
      background-color: #fffdfa; /* 和紙のようなクリーム色 */
      width: 92vw;
      max-width: 500px;
      padding: 20px 10px;
      box-sizing: border-box;
      position: relative;
      color: #d34b31; /* 朱色 */
      border: 2px solid #d34b31;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
    }

    /* 内側の細い二重枠線 */
    .omikuji-paper::before {
      content: "";
      position: absolute;
      top: 6px; left: 6px; right: 6px; bottom: 6px;
      border: 1px solid #d34b31;
      pointer-events: none;
    }

    .content-area {
      display: flex;
      flex-direction: column;
      flex: 1;
      opacity: 1;
      transition: opacity 0.8s ease;
    }

    /* ローディングフェード用 */
    .fade { opacity: 0 !important; }

    /* --- 上部：一言メッセージ（格言） --- */
    .top-section {
      writing-mode: vertical-rl;
      width: 100%;
      min-height: 280px; /* メッセージエリアの高さ */
      padding: 30px;
      box-sizing: border-box;
      display: flex;
      align-items: center; 
      justify-content: center; 
    }
    .message-text {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 2;
      letter-spacing: 0.1em;
    }

    /* --- 中央：運勢の横帯 --- */
    .middle-section {
      margin: 0 15px;
      padding: 15px 10px;
      border-top: 1px solid #d34b31;
      border-bottom: 1px solid #d34b31;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .unsei-label {
      font-size: 1.3rem;
      letter-spacing: 0.3em;
      font-weight: 700;
    }
    .unsei-mark {
      width: 36px;
      height: 36px;
      border: 2px solid #d34b31;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.2rem;
    }
    .unsei-value {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 0.2em;
    }

    /* --- 下部：詳細項目 --- */
    .bottom-section {
      display: flex;
      flex-direction: row-reverse; /* 右から左へ並べる魔法 */
      flex-wrap: wrap; /* 端までいったら下段へ折り返す */
      padding: 20px 5px;
      width: 100%;
      box-sizing: border-box;
    }
    .detail-item {
      writing-mode: vertical-rl; /* 項目の中だけ縦書き */
      height: 180px; /* 一段の高さを固定し、綺麗な段組みを作る */
      margin: 0 12px 25px 12px;
    }
    .detail-title {
      font-weight: 700;
      font-size: 1.2rem;
      margin-bottom: 8px; /* 縦書きの下側余白 */
    }
    .detail-desc {
      font-size: 0.95rem;
      line-height: 1.5;
    }

    /* --- ボタン --- */
    .btn-container {
      text-align: center;
      margin-top: 10px;
      margin-bottom: 10px;
      z-index: 100;
    }
    .btn {
      background: #d34b31;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      cursor: pointer;
      font-family: 'Noto Serif JP', serif;
      font-size: 1.1rem;
      box-shadow: 0 4px 10px rgba(211, 75, 49, 0.3);
      transition: all 0.3s ease;
      visibility: hidden;
    }
    .btn:active { transform: translateY(2px); }

    /* --- ローダー --- */
    .loader {
      border: 3px solid rgba(211, 75, 49, 0.2);
      border-top: 3px solid #d34b31;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      position: fixed; /* 画面中央に固定 */
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: none;
    }
    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="loader" id="loader"></div>

  <div class="omikuji-paper">
    <div class="content-area fade" id="content-area">
      
      <!-- 上部：メッセージ -->
      <div class="top-section">
        <div class="message-text" id="message"></div>
      </div>
      
      <!-- 中央：運勢 -->
      <div class="middle-section">
        <div class="unsei-label">運勢</div>
        <div class="unsei-mark">⛩️</div>
        <div class="unsei-value" id="unsei"></div>
      </div>
      
      <!-- 下部：詳細 -->
      <div class="bottom-section">
        <div class="detail-item"><div class="detail-title">願事</div><div class="detail-desc" id="negaigoto"></div></div>
        <div class="detail-item"><div class="detail-title">恋愛</div><div class="detail-desc" id="renai"></div></div>
        <div class="detail-item"><div class="detail-title">待人</div><div class="detail-desc" id="machibito"></div></div>
        <div class="detail-item"><div class="detail-title">商売</div><div class="detail-desc" id="shoubai"></div></div>
        <div class="detail-item"><div class="detail-title">旅行</div><div class="detail-desc" id="ryokou"></div></div>
        <div class="detail-item"><div class="detail-title">学問</div><div class="detail-desc" id="gakumon"></div></div>
        <div class="detail-item"><div class="detail-title">病気</div><div class="detail-desc" id="byouki"></div></div>
        
        <!-- 開運系 -->
        <div class="detail-item"><div class="detail-title">開運物</div><div class="detail-desc" id="kaiun_mono"></div></div>
        <div class="detail-item"><div class="detail-title">開運場所</div><div class="detail-desc" id="kaiun_basho"></div></div>
        <div class="detail-item"><div class="detail-title">開運人物</div><div class="detail-desc" id="kaiun_jinbutsu"></div></div>
        <div class="detail-item"><div class="detail-title">開運色</div><div class="detail-desc" id="kaiun_iro"></div></div>
        
        <!-- 不運系 -->
        <div class="detail-item"><div class="detail-title">不運物</div><div class="detail-desc" id="fuun_mono"></div></div>
        <div class="detail-item"><div class="detail-title">不運場所</div><div class="detail-desc" id="fuun_basho"></div></div>
        <div class="detail-item"><div class="detail-title">不運人物</div><div class="detail-desc" id="fuun_jinbutsu"></div></div>
      </div>

    </div>
    
    <div class="btn-container">
      <button class="btn" id="btn" onclick="fetchOmikuji()">引き直す</button>
    </div>
  </div>

  <script>
    // URLはすでに正しいものがセットされています！
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyI--Lii7gXF0wEPq3mPxAkcH-lSIKysIZNztaysItGbLtafaRkmHqSylETp15Zotns/exec";

    window.onload = function() {
      fetchOmikuji();
    };

    function fetchOmikuji() {
      const btn = document.getElementById('btn');
      const loader = document.getElementById('loader');
      const contentArea = document.getElementById('content-area');

      // 非表示＆ローディング
      contentArea.classList.add('fade');
      btn.style.visibility = 'hidden';
      loader.style.display = 'block';

      fetch(GAS_URL, { redirect: 'follow' })
        .then(response => response.json())
        .then(data => {
          setTimeout(() => {
            document.getElementById('unsei').innerText = data.unsei;
            document.getElementById('message').innerText = data.message;
            document.getElementById('negaigoto').innerText = data.negaigoto;
            document.getElementById('renai').innerText = data.renai;
            document.getElementById('machibito').innerText = data.machibito;
            document.getElementById('shoubai').innerText = data.shoubai;
            document.getElementById('ryokou').innerText = data.ryokou;
            document.getElementById('gakumon').innerText = data.gakumon;
            document.getElementById('byouki').innerText = data.byouki;
            
            document.getElementById('kaiun_mono').innerText = data.kaiun_mono;
            document.getElementById('kaiun_basho').innerText = data.kaiun_basho;
            document.getElementById('kaiun_jinbutsu').innerText = data.kaiun_jinbutsu;
            document.getElementById('kaiun_iro').innerText = data.kaiun_iro;
            
            document.getElementById('fuun_mono').innerText = data.fuun_mono;
            document.getElementById('fuun_basho').innerText = data.fuun_basho;
            document.getElementById('fuun_jinbutsu').innerText = data.fuun_jinbutsu;
            
            // ふわっと表示
            contentArea.classList.remove('fade');
            loader.style.display = 'none';
            btn.style.visibility = 'visible';
            
            // スクロールを一番上に戻す
            window.scrollTo(0, 0);
          }, 400);
        })
        .catch(error => {
          document.getElementById('message').innerText = "通信エラーが発生しました。もう一度引き直してください。";
          contentArea.classList.remove('fade');
          loader.style.display = 'none';
          btn.style.visibility = 'visible';
        });
    }
  </script>
</body>
</html>
