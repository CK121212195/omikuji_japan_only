<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- Google tag (gtag.js) -->

  <script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⛩️LN Omikuji⚡️</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0; padding: 20px 0; font-family: 'Noto Serif JP', serif;
      background-color: #2c3e50; display: flex; justify-content: center;
      align-items: flex-start; min-height: 100vh; box-sizing: border-box;
      transition: background-color 0.1s;
    }
    .omikuji-paper {
      background-color: #fffdfa; width: 92vw; max-width: 500px; padding: 20px 10px;
      box-sizing: border-box; position: relative; color: #d34b31;
      border: 2px solid #d34b31; box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      display: flex; flex-direction: column;
    }
    .omikuji-paper::before {
      content: ""; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px;
      border: 1px solid #d34b31; pointer-events: none;
    }

    /* --- お賽銭・インボイスエリア --- */
    .paywall-area {
      text-align: center; padding: 30px 10px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-height: 400px;
    }
    .paywall-text { font-size: 1.3rem; font-weight: bold; margin-bottom: 20px; line-height: 1.8; color: #d34b31; }
    .invoice-container { display: none; width: 100%; animation: fadeIn 0.5s; }
    .qr-box {
      border: 3px solid #d34b31; border-radius: 10px; padding: 10px;
      background: white; display: inline-block; margin-bottom: 15px;
    }
    .invoice-text {
      width: 90%; height: 60px; font-size: 0.8rem; word-break: break-all;
      padding: 8px; border: 1px solid #ccc; border-radius: 5px; resize: none;
      background: #f9f9f9; margin-bottom: 10px; cursor: pointer; color: #333;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    /* --- ボタン --- */
    .btn-container { text-align: center; margin-top: 10px; margin-bottom: 10px; z-index: 100; }
    .btn {
      background: #d34b31; color: white; border: none; padding: 14px 25px;
      border-radius: 25px; cursor: pointer; font-family: 'Noto Serif JP', serif;
      font-size: 1.1rem; box-shadow: 0 4px 10px rgba(211, 75, 49, 0.3);
      transition: all 0.3s ease; margin: 5px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:active { transform: translateY(2px); }
    .btn-secondary { background: #2c3e50; font-size: 0.95rem; }
    .btn-share { background: #0f1419; color: white; font-size: 1rem; }
    .btn:disabled { background: #e0e0e0; color: #999; box-shadow: none; cursor: not-allowed; }

    /* --- アニメーション要素 (通常時は非表示) --- */
    .shrine-visual { display: none; position: relative; margin-bottom: 20px; height: 160px; }
    .omikuji-box { font-size: 80px; display: inline-block; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2)); margin-top: 40px;}
    .coin { position: absolute; font-size: 45px; top: -10px; left: 50%; transform: translateX(-50%); display: none; color: #f7931a; text-shadow: 0 2px 4px rgba(0,0,0,0.3); z-index: 10; }
    .flash { animation: flashAnim 0.3s ease-out; }
    @keyframes flashAnim { 0% { background-color: #2c3e50; } 50% { background-color: #ffe600; } 100% { background-color: #2c3e50; } }
    .drop-coin { display: block; animation: dropAnim 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
    @keyframes dropAnim { 0% { top: -10px; opacity: 1; transform: translateX(-50%) rotate(0deg); } 100% { top: 70px; opacity: 0; transform: translateX(-50%) rotate(180deg); } }
    .shake { animation: shakeAnim 0.4s infinite; }
    @keyframes shakeAnim { 0% { transform: translate(1px, 1px) rotate(0deg); } 25% { transform: translate(-4px, 0px) rotate(-15deg); } 50% { transform: translate(4px, 2px) rotate(15deg); } 75% { transform: translate(-2px, -2px) rotate(-5deg); } 100% { transform: translate(1px, 1px) rotate(0deg); } }
    
    .loading-text { font-size: 1rem; margin-top: 15px; font-weight: bold; letter-spacing: 0.1em; }
    .polling-area { margin-top: 15px; font-size: 1rem; color: #d34b31; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .spinner { width: 18px; height: 18px; border: 3px solid rgba(211, 75, 49, 0.3); border-top: 3px solid #d34b31; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* --- おみくじ結果エリア --- */
    .content-area { display: none; flex-direction: column; flex: 1; opacity: 1; transition: opacity 0.8s ease; }
    .fade { opacity: 0 !important; }
    .top-section { writing-mode: vertical-rl; width: 100%; min-height: 280px; padding: 30px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; }
    .message-text { font-size: 1.6rem; font-weight: 700; line-height: 2; letter-spacing: 0.1em; }
    .middle-section { margin: 0 15px; padding: 15px 10px; border-top: 1px solid #d34b31; border-bottom: 1px solid #d34b31; display: flex; justify-content: space-between; align-items: center; }
    .unsei-label { font-size: 1.3rem; letter-spacing: 0.3em; font-weight: 700; }
    .unsei-mark { width: 36px; height: 36px; border: 2px solid #d34b31; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }
    .unsei-value { font-size: 2.2rem; font-weight: 700; letter-spacing: 0.2em; }
    .bottom-section { display: flex; flex-direction: row-reverse; flex-wrap: wrap; padding: 20px 5px; width: 100%; box-sizing: border-box; }
    .detail-item { writing-mode: vertical-rl; height: 180px; margin: 0 12px 25px 12px; }
    .detail-title { font-weight: 700; font-size: 1.2rem; margin-bottom: 8px; }
    .detail-desc { font-size: 0.95rem; line-height: 1.5; }
  </style>
</head>
<body>

  <div class="omikuji-paper">

    <!-- ⛩️ ステップ1 & 2: お賽銭エリア -->
    <div class="paywall-area" id="paywall-area">
      
      <!-- アニメーション発火時のみ表示される要素 -->
      <div class="shrine-visual" id="shrine-visual">
        <div class="coin" id="coin">₿</div>
        <div class="omikuji-box" id="omikuji">🪘</div>
        <div class="loading-text">神様にお伺い中...⛩️</div>
      </div>

      <!-- 初期画面のテキスト -->
      <div class="paywall-text" id="paywall-text"></div>
      
      <!-- 初回無料ボタン -->
      <button class="btn" id="free-btn" onclick="playFree()" style="display:none;">無料で引く✨</button>
      <!-- 2回目以降のお賽銭ボタン -->
      <button class="btn" id="generate-btn" onclick="generateInvoice()" style="display:none;">100satsのインボイスを発行</button>
      
      <!-- インボイス表示＆確認エリア -->
      <div class="invoice-container" id="invoice-container">
        
        <!-- ウォレット起動ボタン (スマホ特化) -->
        <a id="wallet-btn" class="btn" href="#" style="text-decoration: none; margin-bottom: 15px; display: inline-block;">📲 ウォレットアプリで支払う</a>
        
        <div class="qr-box">
          <a id="lightning-link" href="#">
            <img id="qr-code" src="" alt="Lightning Invoice" width="200" height="200">
          </a>
        </div>
        <p style="font-size: 0.8rem; font-weight: bold; margin: 0 0 5px 0; color: #666;">インボイス文字列 (タップでコピー)</p>
        <textarea class="invoice-text" id="invoice-text" readonly onclick="copyInvoice()"></textarea>
        
        <!-- 自動ポーリング中表示 -->
        <div class="polling-area">
          <div class="spinner"></div>
          お賽銭の到着を待っています...⛩️
        </div>

        <!-- フォールバック用手動確認ボタン -->
        <div style="margin-top: 20px; border-top: 1px dashed #e0e0e0; padding-top: 15px;">
          <p style="font-size: 0.8rem; color: #888; margin-bottom: 10px;">自動で画面が切り替わらない場合</p>
          <button class="btn btn-secondary" onclick="verifyPayment()">手動で決済確認する</button>
        </div>
      </div>
    </div>

    <!-- 📜 ステップ3: おみくじ結果エリア -->
    <div class="content-area fade" id="content-area">
      <div class="top-section"><div class="message-text" id="message"></div></div>
      <div class="middle-section"><div class="unsei-label">運勢</div><div class="unsei-mark">⛩️</div><div class="unsei-value" id="unsei"></div></div>
      <div class="bottom-section">
        <div class="detail-item"><div class="detail-title">願事</div><div class="detail-desc" id="negaigoto"></div></div>
        <div class="detail-item"><div class="detail-title">恋愛</div><div class="detail-desc" id="renai"></div></div>
        <div class="detail-item"><div class="detail-title">待人</div><div class="detail-desc" id="machibito"></div></div>
        <div class="detail-item"><div class="detail-title">商売</div><div class="detail-desc" id="shoubai"></div></div>
        <div class="detail-item"><div class="detail-title">旅行</div><div class="detail-desc" id="ryokou"></div></div>
        <div class="detail-item"><div class="detail-title">学問</div><div class="detail-desc" id="gakumon"></div></div>
        <div class="detail-item"><div class="detail-title">病気</div><div class="detail-desc" id="byouki"></div></div>
        <div class="detail-item"><div class="detail-title">開運物</div><div class="detail-desc" id="kaiun_mono"></div></div>
        <div class="detail-item"><div class="detail-title">開運場所</div><div class="detail-desc" id="kaiun_basho"></div></div>
        <div class="detail-item"><div class="detail-title">開運人物</div><div class="detail-desc" id="kaiun_jinbutsu"></div></div>
        <div class="detail-item"><div class="detail-title">開運色</div><div class="detail-desc" id="kaiun_iro"></div></div>
        <div class="detail-item"><div class="detail-title">不運物</div><div class="detail-desc" id="fuun_mono"></div></div>
        <div class="detail-item"><div class="detail-title">不運場所</div><div class="detail-desc" id="fuun_basho"></div></div>
        <div class="detail-item"><div class="detail-title">不運人物</div><div class="detail-desc" id="fuun_jinbutsu"></div></div>
      </div>
      
      <!-- シェア＆リセットボタン -->
      <div class="btn-container">
        <button class="btn btn-share" onclick="shareTwitter()">
          <svg viewBox="0 0 24 24" aria-hidden="true" style="width: 18px; height: 18px; fill: white;"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 22.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
          𝕏 で結果をシェアする
        </button>
        <button class="btn" onclick="resetApp()">もう一度引く</button>
      </div>
    </div>

  </div>

  <script>
    const LNBITS_API_KEY = "67e5b0ad270f44d19e6d768bb3314e49"; 
    const LNBITS_API_URL = "https://demo.lnbits.com/api/v1/payments"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyI--Lii7gXF0wEPq3mPxAkcH-lSIKysIZNztaysItGbLtafaRkmHqSylETp15Zotns/exec";

    let currentPaymentHash = "";
    let checkPaymentInterval = null;
    let currentOmikujiData = null;

    window.onload = () => { initApp(); };

    function initApp() {
      const isFirstTime = !localStorage.getItem('ln_omikuji_played');
      if (isFirstTime) {
        document.getElementById('free-btn').style.display = 'inline-flex';
        document.getElementById('generate-btn').style.display = 'none';
        document.getElementById('paywall-text').innerHTML = "初回は無料で<br>おみくじが引けます！✨";
      } else {
        document.getElementById('free-btn').style.display = 'none';
        document.getElementById('generate-btn').style.display = 'inline-flex';
        document.getElementById('paywall-text').innerHTML = "おみくじを引くには<br>お賽銭（100 sats）をお願いします⛩️";
      }
    }

    function playFree() {
      localStorage.setItem('ln_omikuji_played', 'true');
      playAnimationAndFetch();
    }

    function generateInvoice() {
      const btn = document.getElementById('generate-btn');
      btn.innerText = "インボイス生成中...⚡️";
      btn.disabled = true;

      fetch(LNBITS_API_URL, {
        method: "POST",
        headers: { "X-Api-Key": LNBITS_API_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ out: false, amount: 100, memo: "おみくじ お賽銭⛩️" })
      })
      .then(res => res.json())
      .then(data => {
        currentPaymentHash = data.payment_hash;
        const invoice = data.payment_request;
        
        document.getElementById('qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=lightning:${invoice}`;
        document.getElementById('lightning-link').href = `lightning:${invoice}`;
        document.getElementById('wallet-btn').href = `lightning:${invoice}`;
        document.getElementById('invoice-text').value = invoice;
        
        btn.style.display = 'none';
        btn.disabled = false;
        btn.innerText = "100satsのインボイスを発行";
        document.getElementById('invoice-container').style.display = 'block';
        
        pollPaymentStatus(currentPaymentHash);
      })
      .catch(err => {
        alert("インボイスの生成に失敗しました。時間をおいて試してください。");
        btn.disabled = false;
        btn.innerText = "100satsのインボイスを発行";
      });
    }

    function copyInvoice() {
      const txt = document.getElementById('invoice-text');
      txt.select();
      document.execCommand('copy');
      alert("📋 インボイスをコピーしました！ウォレットに貼り付けてください。");
    }

    function pollPaymentStatus(hash) {
      checkPaymentInterval = setInterval(() => {
        fetch(`${LNBITS_API_URL}/${hash}`, {
          method: "GET", headers: { "X-Api-Key": LNBITS_API_KEY }
        })
        .then(res => res.json())
        .then(data => {
          if (data.paid) {
            clearInterval(checkPaymentInterval);
            playAnimationAndFetch();
          }
        }).catch(console.error);
      }, 3000);
    }

    function verifyPayment() {
      if (!currentPaymentHash) return;
      fetch(`${LNBITS_API_URL}/${currentPaymentHash}`, {
        method: "GET", headers: { "X-Api-Key": LNBITS_API_KEY }
      }).then(res => res.json()).then(data => {
        if (data.paid) {
          clearInterval(checkPaymentInterval);
          playAnimationAndFetch();
        } else {
          alert("まだお賽銭が確認できません⛩️ アプリで支払い完了後に再度お試しください。");
        }
      });
    }

    // ⚡️ ここから神殿の扉が開くアニメーション ⚡️
    async function playAnimationAndFetch() {
      // 初期画面の静的なUIを消す
      document.getElementById('invoice-container').style.display = 'none';
      document.getElementById('free-btn').style.display = 'none';
      document.getElementById('generate-btn').style.display = 'none';
      document.getElementById('paywall-text').style.display = 'none';

      // 隠していたアニメーション要素（筒とコイン）を出現させる
      const shrineVisual = document.getElementById('shrine-visual');
      const coin = document.getElementById('coin');
      const omikuji = document.getElementById('omikuji');
      
      shrineVisual.style.display = 'block';
      document.body.classList.add('flash'); 
      
      coin.style.display = 'block';
      coin.classList.add('drop-coin'); 
      omikuji.classList.add('shake');

      // 最低1.5秒はアニメーションを見せる
      const animPromise = new Promise(resolve => setTimeout(resolve, 1500));
      const fetchPromise = fetch(GAS_URL, { redirect: 'follow' }).then(res => res.json());

      try {
        const[_, data] = await Promise.all([animPromise, fetchPromise]);
        currentOmikujiData = data;

        document.body.classList.remove('flash');
        coin.classList.remove('drop-coin');
        coin.style.display = 'none';
        omikuji.classList.remove('shake');
        omikuji.innerText = "📜";

        setTimeout(() => { showResult(data); omikuji.innerText = "🪘"; }, 500);

      } catch (err) {
        alert("神様との通信に失敗しました。もう一度引き直してください。");
        resetApp();
      }
    }

    function showResult(data) {
      document.getElementById('unsei').innerText = data.unsei;
      document.getElementById('message').innerText = data.message;
      document.getElementById('negaigoto').innerText = data.negaigoto;
      document.getElementById('renai').innerText = data.renai;
      document.getElementById('machibito').innerText = data.machibito;
      document.getElementById('shoubai').innerText = data.shoubai;
      document.getElementById('ryokou').innerText = data.ryokou;
      document.getElementById('gakumon').innerText = data.gakumon;
      document.getElementById('byouki').innerText = data.byouki;
      document.getElementById('kaiun_mono').innerText = data.kaiun_mono;
      document.getElementById('kaiun_basho').innerText = data.kaiun_basho;
      document.getElementById('kaiun_jinbutsu').innerText = data.kaiun_jinbutsu;
      document.getElementById('kaiun_iro').innerText = data.kaiun_iro;
      document.getElementById('fuun_mono').innerText = data.fuun_mono;
      document.getElementById('fuun_basho').innerText = data.fuun_basho;
      document.getElementById('fuun_jinbutsu').innerText = data.fuun_jinbutsu;
      
      document.getElementById('paywall-area').style.display = 'none';
      const contentArea = document.getElementById('content-area');
      contentArea.style.display = 'flex';
      
      setTimeout(() => {
        contentArea.classList.remove('fade');
        window.scrollTo(0, 0);
      }, 100);
    }

    function shareTwitter() {
      if(!currentOmikujiData) return;
      const text = encodeURIComponent(`電光石火！ビットコイン神社⛩️でおみくじを引いたよ！\n\n運勢：【${currentOmikujiData.unsei}】\n神告：${currentOmikujiData.message}\n\n⚡️あなたもSatsをお賽銭して運勢を占おう！\n#ビットコイン神社 #LightningNetwork #おみくじ`);
      const url = encodeURIComponent(window.location.href); 
      window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
    }

    function resetApp() {
      document.getElementById('content-area').classList.add('fade');
      setTimeout(() => {
        document.getElementById('content-area').style.display = 'none';
        
        // 画面を初期状態に戻す
        document.getElementById('paywall-area').style.display = 'flex';
        document.getElementById('paywall-text').style.display = 'block';
        document.getElementById('shrine-visual').style.display = 'none';
        document.getElementById('invoice-container').style.display = 'none';
        
        document.body.classList.remove('flash');
        document.getElementById('coin').style.display = 'none';
        document.getElementById('omikuji').classList.remove('shake');
        
        currentPaymentHash = "";
        clearInterval(checkPaymentInterval);
        initApp(); 
        window.scrollTo(0, 0);
      }, 500);
    }
  </script>
</body>
</html>
