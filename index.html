<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ビットコイン神社おみくじ⚡️</title>
<style>
  body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; text-align: center; background-color: #f4f4f4; margin: 0; padding: 50px; }
  .shrine-container { background: #fff; border-radius: 15px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; overflow: hidden; position: relative; }
  h1 { color: #d32f2f; }
  
  /* ガラガラ筒のデザイン */
  .omikuji-box { font-size: 80px; margin: 20px 0; display: inline-block; transition: transform 0.1s; }
  
  /* ボタンのデザイン */
  button { font-size: 18px; padding: 15px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.2s; width: 100%; }
  .btn-free { background-color: #4CAF50; color: white; }
  .btn-pay { background-color: #f7931a; color: white; } /* ビットコインオレンジ */
  .btn-share { background-color: #000000; color: white; display: none; margin-top: 15px; }

  /* 雷フラッシュアニメーション */
  .flash { animation: flashAnim 0.3s ease-out; }
  @keyframes flashAnim {
    0% { background-color: #fff; }
    50% { background-color: #ffe600; }
    100% { background-color: #fff; }
  }

  /* ガラガラ揺れるアニメーション */
  .shake { animation: shakeAnim 0.5s infinite; }
  @keyframes shakeAnim {
    0% { transform: translate(1px, 1px) rotate(0deg); }
    25% { transform: translate(-3px, 0px) rotate(-15deg); }
    50% { transform: translate(3px, 2px) rotate(15deg); }
    75% { transform: translate(-1px, -1px) rotate(-5deg); }
    100% { transform: translate(1px, 1px) rotate(0deg); }
  }

  /* コインが落ちるアニメーション */
  .coin { position: absolute; font-size: 40px; top: -50px; left: 50%; transform: translateX(-50%); display: none; color: #f7931a; }
  .drop-coin { display: block; animation: dropAnim 0.5s ease-in forwards; }
  @keyframes dropAnim {
    0% { top: -50px; opacity: 1; }
    100% { top: 150px; opacity: 0; }
  }

  #result-text { font-size: 24px; font-weight: bold; margin-top: 20px; color: #333; display: none; }
  #sats-message { color: #666; font-size: 14px; margin-top: 10px; }
</style>
</head>
<body>

<div class="shrine-container" id="app-box">
  <h1>ビットコイン神社⛩️</h1>
  <div class="coin" id="coin">₿</div>
  <div class="omikuji-box" id="omikuji">🪘</div>
  
  <p id="sats-message">初回は無料でおみくじが引けます！</p>
  
  <button id="draw-btn" class="btn-free" onclick="drawOmikuji()">無料で引く✨</button>
  
  <div id="result-text"></div>
  <button id="share-btn" class="btn-share" onclick="shareTwitter()">𝕏 で結果をシェアする</button>
</div>

<script>
  // おみくじの結果リスト
  const results =[
    { rank: "大吉 🚀", text: "To The Moon!! 資産も運気も爆上げの予感⚡️" },
    { rank: "中吉 🛡️", text: "HODL推奨。焦らず待てば福来たる✨" },
    { rank: "吉 ⚡️", text: "コツコツSats（徳）を積み上げるのが吉🙏" },
    { rank: "末吉 📊", text: "レンジ相場。平穏な一日になりそう🍵" }
  ];

  let isFirstTime = true; // 実際のアプリでは localStorage などを利用します
  let currentResult = "";

  // ページ読み込み時に状態をチェック（今回はモックなので変数管理ですが、実戦用コードを想定）
  window.onload = () => {
    if(localStorage.getItem('hasDrawnOmikuji')) {
      isFirstTime = false;
      updateToPaidMode();
    }
  };

  function updateToPaidMode() {
    const btn = document.getElementById("draw-btn");
    const msg = document.getElementById("sats-message");
    btn.className = "btn-pay";
    btn.innerHTML = "100satsでお賽銭を入れて引く⚡️";
    msg.innerHTML = "おみくじを引くために、100sats（お賽銭）をお願いします⛩️";
  }

  function drawOmikuji() {
    const appBox = document.getElementById("app-box");
    const omikuji = document.getElementById("omikuji");
    const coin = document.getElementById("coin");
    const resultText = document.getElementById("result-text");
    const shareBtn = document.getElementById("share-btn");

    // 初期化
    resultText.style.display = "none";
    shareBtn.style.display = "none";

    // 2回目以降の「お賽銭」支払いプロセス（擬似）
    if (!isFirstTime) {
      // ⚡️ここで WebLN（Albyなど）の決済処理を入れる想定⚡️
      // await window.webln.enable();
      // await window.webln.sendPayment(invoice);
      coin.classList.remove("drop-coin");
      void coin.offsetWidth; // アニメーションリセット
      coin.classList.add("drop-coin");
    }

    // カミナリフラッシュ ＆ ガラガラポン アニメーション
    appBox.classList.add("flash");
    omikuji.classList.add("shake");
    
    setTimeout(() => {
      appBox.classList.remove("flash");
      omikuji.classList.remove("shake");
      
      // 結果をランダムに選ぶ
      const randomDraw = results[Math.floor(Math.random() * results.length)];
      currentResult = `【${randomDraw.rank}】${randomDraw.text}`;
      
      // 結果表示
      omikuji.innerText = "📜"; // 筒から紙に変わる演出
      resultText.innerHTML = `${randomDraw.rank}<br><span style="font-size:16px">${randomDraw.text}</span>`;
      resultText.style.display = "block";
      shareBtn.style.display = "block";

      // 1回引いたら有料モードに切り替え
      if(isFirstTime) {
        isFirstTime = false;
        localStorage.setItem('hasDrawnOmikuji', 'true');
        setTimeout(updateToPaidMode, 2000); // 2秒後にボタンを有料版に更新
      }

      setTimeout(() => { omikuji.innerText = "🪘"; }, 3000); // 筒に戻す

    }, 1000); // 1秒間揺れる
  }

  function shareTwitter() {
    const text = encodeURIComponent(`電光石火！ビットコイン神社⛩️でおみくじを引いたよ！\n結果は ${currentResult}\n\n⚡️あなたもSatsをお賽銭して運勢を占おう！\n#ビットコイン神社 #LightningNetwork #おみくじ`);
    const url = encodeURIComponent("https://your-website-url.com"); // 本番のURLに変更してください
    window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
  }
</script>

</body>
</html>
